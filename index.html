<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monte Gordo 2026 | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --bg-color: #FDFBFA; --primary: #0D9488; --secondary: #F43F5E; --accent: #EAB308; --stone-900: #1C1917; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-color); color: var(--stone-900); }
        .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(8px); border: 1px solid rgba(229, 231, 235, 0.5); }
        .custom-shadow { box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05); }
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .table-input { background: transparent; width: 100%; padding: 4px; border-bottom: 1px solid transparent; transition: all 0.2s; }
        .table-input:focus { border-bottom-color: var(--primary); background: rgba(13, 148, 136, 0.05); }
    </style>
</head>
<body class="min-h-screen pb-12">
    <!-- Overlay de Carregamento -->
    <div id="loading" class="loading-overlay font-bold text-teal-800 flex flex-col gap-4">
        <div class="w-12 h-12 border-4 border-teal-600 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <!-- Tela de Login -->
    <div id="login-screen" class="fixed inset-0 bg-stone-100 z-[9999] flex flex-col items-center justify-center">
        <div class="bg-white p-10 rounded-3xl custom-shadow text-center max-w-md w-full mx-4">
            <span class="text-6xl mb-4 block">🌴</span>
            <h1 class="text-3xl font-extrabold text-teal-900 mb-2">Monte Gordo 2026</h1>
            <p class="text-stone-500 mb-8 text-sm">Faça login para acessar o planejamento.</p>
            <button id="btn-login-google" class="w-full bg-teal-600 text-white px-6 py-4 rounded-xl font-bold hover:bg-teal-700 shadow-lg">Entrar com Google</button>
        </div>
    </div>

    <!-- Menu Lateral (Drawer) -->
    <div id="mobile-menu" class="fixed inset-y-0 left-0 w-64 bg-white z-[9998] transform -translate-x-full transition-transform duration-300 shadow-2xl p-6">
        <div class="flex justify-between items-center mb-8">
            <h2 class="font-bold text-xl">Menu</h2>
            <button onclick="toggleMenu()" class="text-2xl">✕</button>
        </div>
        <nav class="flex flex-col gap-4">
            <button onclick="switchTab('resumo')" class="text-left font-bold py-2 hover:text-teal-600">Resumo</button>
            <button onclick="switchTab('logistica')" class="text-left font-bold py-2 hover:text-teal-600">Logística</button>
            <button onclick="switchTab('mercado')" class="text-left font-bold py-2 hover:text-teal-600">Mercado</button>
            <button onclick="switchTab('financeiro')" class="text-left font-bold py-2 hover:text-teal-600">Financeiro</button>
            <button onclick="switchTab('checklist')" class="text-left font-bold py-2 hover:text-teal-600">Checklist</button>
        </nav>
    </div>

    <!-- Cabeçalho -->
    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-stone-200">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <button onclick="toggleMenu()" class="text-2xl p-2 bg-stone-100 rounded-lg">☰</button>
                <h1 class="font-extrabold text-lg text-teal-900">Monte Gordo 2026</h1>
            </div>
            <div id="user-display" class="flex items-center gap-3"></div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <!-- SEÇÕES (Resumo, Logistica, Mercado, Financeiro, Checklist) -->
        <!-- Mantive exatamente as suas estruturas, apenas removi a nav superior -->
        <section id="tab-resumo" class="space-y-6">
            <!-- (Conteúdo do Resumo igual ao seu anterior) -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="md:col-span-2 glass-panel p-8 rounded-3xl custom-shadow flex flex-col justify-between border-l-8 border-teal-600">
                    <h2 class="text-3xl font-extrabold text-stone-900 mb-4">Olá, grupo! 👋</h2>
                </div>
                <div class="flex flex-col gap-6">
                    <div class="bg-teal-900 text-white p-6 rounded-3xl text-center">Progresso Fundo</div>
                    <div class="bg-rose-900 text-white p-6 rounded-3xl text-center">Total Gastos</div>
                </div>
            </div>
        </section>

        <!-- ... (Coloque aqui o restante das suas <section> id="tab-..." exatamente como estavam) ... -->
    </main>

    <script type="module">
        // ... (Seu script continua o mesmo, adicione apenas a função abaixo)

        window.toggleMenu = () => {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('-translate-x-full');
        };

        window.switchTab = (tabId) => {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            toggleMenu(); // Fecha o menu automaticamente ao clicar
        };

        // ... resto do seu código
    </script>
</body>
</html>
